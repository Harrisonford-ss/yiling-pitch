server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100M;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 静态资源缓存
    location ~* \.(png|jpg|jpeg|gif|webp|svg)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
